<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perles des Savants</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg: #EEF0F2;
            --paper: #ffffff;
            --lines: #e0e7ff;
            --margin: #ff8a80;
            --text: #2c3e50;
            --accent: #844F4A;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --paper: #2d2d2d;
            --lines: #404040;
            --margin: #5c2b2b;
            --text: #e0e0e0;
            --accent: #d4a373;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
            z-index: 1000;
        }

        header {
            text-align: center;
            margin: 40px 0;
        }

        .notebook {
            width: 90%;
            max-width: 800px;
            background: var(--paper);
            min-height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 40px 40px 40px 80px;
            background-image: linear-gradient(var(--lines) 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
        }

        .notebook::before {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--margin);
        }

        .filters {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .quote-card {
            margin-bottom: 2rem;
            position: relative;
        }

        .quote-text {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-style: italic;
        }

        .quote-author {
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        .quote-tag {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .cover-img {
            max-width: 150px;
            float: right;
            margin-left: 20px;
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <header>
        <h1>Perles des Savants</h1>
    </header>

    <div class="notebook">
        <div class="filters" id="filters">
            <button class="filter-btn active" onclick="filterQuotes('all')">Tous</button>
            <button class="filter-btn" onclick="filterQuotes('tawhid')">Tawhid</button>
            <button class="filter-btn" onclick="filterQuotes('zuhd')">Zuhd</button>
            <button class="filter-btn" onclick="filterQuotes('salafs')">Salafs</button>
        </div>

        <div id="quotes-container">
            <p>Chargement des perles...</p>
        </div>
    </div>

    <footer style="text-align: center; margin: 50px; opacity: 0.5;">
        &copy; 2026 Perles des Savants
    </footer>

    <script>
        let allQuotes = [];

        // Charger les citations depuis l'API D1
        async function fetchQuotes() {
            try {
                const response = await fetch('/api/perles');
                allQuotes = await response.json();
                renderQuotes(allQuotes);
            } catch (err) {
                document.getElementById('quotes-container').innerHTML = "<p>Erreur de chargement.</p>";
            }
        }

        function renderQuotes(quotes) {
            const container = document.getElementById('quotes-container');
            container.innerHTML = quotes.map(q => `
                <div class="quote-card">
                    ${q.cover_url ? `<img src="${q.cover_url}" class="cover-img" alt="Couverture">` : ''}
                    <div class="quote-text">"${q.text}"</div>
                    <span class="quote-author">— ${q.author}</span>
                    <div class="quote-tag">${q.tag}</div>
                </div>
                <hr style="border: none; border-bottom: 1px solid var(--lines); margin: 1rem 0;">
            `).join('');
        }

        function filterQuotes(tag) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tag);
            });
            
            if (tag === 'all') {
                renderQuotes(allQuotes);
            } else {
                const filtered = allQuotes.filter(q => q.tag.toLowerCase() === tag);
                renderQuotes(filtered);
            }
        }

        function toggleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // Initialisation
        fetchQuotes();
    </script>
</body>
</html>
