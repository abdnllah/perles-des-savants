<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perles des Savants</title>
    <style>
        :root {
            --bg: #EEF0F2;
            --paper: #ffffff;
            --lines: #e0e7ff;
            --margin: #ff8a80;
            --text: #2c3e50;
            --accent: #844F4A;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --paper: #2d2d2d;
            --lines: #404040;
            --margin: #5c2b2b;
            --text: #e0e0e0;
            --accent: #d4a373;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
            z-index: 1000;
        }

        header {
            text-align: center;
            margin: 40px 0;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-weight: normal;
            letter-spacing: 2px;
        }

        .notebook {
            width: 90%;
            max-width: 800px;
            background: var(--paper);
            min-height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 40px 40px 40px 80px;
            background-image: linear-gradient(var(--lines) 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
            border-radius: 2px;
        }

        .notebook::before {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--margin);
            opacity: 0.5;
        }

        .filters {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 2px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .quote-card {
            margin-bottom: 2rem;
            position: relative;
            clear: both;
            min-height: 100px;
        }

        .quote-text {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-style: italic;
            line-height: 1.6;
        }

        .quote-author {
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        .quote-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-top: 5px;
        }

        .cover-img {
            max-width: 120px;
            float: right;
            margin-left: 20px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
        }

        footer {
            text-align: center;
            margin: 60px;
            opacity: 0.4;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .notebook { padding: 40px 20px 40px 50px; }
            .notebook::before { left: 40px; }
            .cover-img { max-width: 80px; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="Changer le mode">🌓</button>

    <header>
        <h1>Perles des Savants</h1>
    </header>

    <div class="notebook">
        <div class="filters" id="filters">
            <button class="filter-btn active" onclick="filterQuotes('all')">Tous</button>
            <button class="filter-btn" onclick="filterQuotes('tawhid')">Tawhid</button>
            <button class="filter-btn" onclick="filterQuotes('zuhd')">Zuhd</button>
            <button class="filter-btn" onclick="filterQuotes('salafs')">Salafs</button>
            <button class="filter-btn" onclick="filterQuotes('women')">Women</button>
            <button class="filter-btn" onclick="filterQuotes('marriage')">Marriage</button>
        </div>

        <div id="quotes-container">
            <p>Chargement des perles...</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Perles des Savants
    </footer>

    <script>
        let allQuotes = [];

        // Charger les citations depuis l'API Cloudflare
        async function fetchQuotes() {
            try {
                const response = await fetch('/api/perles');
                if (!response.ok) throw new Error();
                allQuotes = await response.json();
                renderQuotes(allQuotes);
            } catch (err) {
                document.getElementById('quotes-container').innerHTML = "<p>Erreur lors du chargement des données. Vérifiez la base D1.</p>";
            }
        }

        // Afficher les citations dans le HTML
       function renderQuotes(quotes) {
    const container = document.getElementById('quotes-container');
    if (!container) return; // Sécurité si l'ID est mal écrit

    if (!quotes || quotes.length === 0) {
        container.innerHTML = "<p>Aucune perle trouvée.</p>";
        return;
    }

    container.innerHTML = quotes.map(q => {
        // On s'assure que les variables existent pour éviter les erreurs "undefined"
        const author = q.author || q.AUTHOR || "Auteur inconnu";
        const text = q.text || q.TEXT || "";
        const page = q.page || q.PAGE || null;
        const cover = q.cover_url || q.COVER_URL || null;
        const tag = q.tag || q.TAG || "";

        return `
            <div class="quote-card">
                ${cover ? `<img src="${cover}" class="cover-img" alt="Couverture">` : ''}
                <div class="quote-text">"${text}"</div>
                <span class="quote-author">
                    — ${author} 
                    ${page ? `<small style="opacity: 0.6; font-size: 0.8rem;">(p. ${page})</small>` : ''}
                </span>
                <div class="quote-tag">${tag}</div>
            </div>
            <hr style="border: none; border-bottom: 1px solid var(--lines); margin: 1.5rem 0; clear: both;">
        `;
    }).join('');
}
        // Système de filtrage
        function filterQuotes(tag) {
            // Mise à jour visuelle des boutons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tag);
            });
            
            if (tag === 'all') {
                renderQuotes(allQuotes);
            } else {
                const filtered = allQuotes.filter(q => q.tag.toLowerCase() === tag);
                renderQuotes(filtered);
            }
        }

        // Mode Sombre
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        // Charger le thème préféré au démarrage
        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        // Lancement initial
        fetchQuotes();
    </script>
</body>
</html>
