<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perles des Savants</title>
    <style>
        :root {
            --bg: #EEF0F2;
            --paper: #ffffff;
            --lines: #e0e7ff;
            --margin: #ff8a80;
            --text: #2c3e50;
            --accent: #844F4A;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --paper: #2d2d2d;
            --lines: #404040;
            --margin: #5c2b2b;
            --text: #e0e0e0;
            --accent: #d4a373;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            background: none;
            border: none;
            z-index: 1000;
        }

        header {
            text-align: center;
            margin: 40px 0;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-weight: normal;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .notebook {
            width: 90%;
            max-width: 800px;
            background: var(--paper);
            min-height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            padding: 40px 40px 40px 80px;
            background-image: linear-gradient(var(--lines) 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
            border-radius: 4px;
        }

        .notebook::before {
            content: '';
            position: absolute;
            left: 60px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--margin);
            opacity: 0.5;
        }

        .filters {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 4px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .quote-card {
            margin-bottom: 2rem;
            position: relative;
            clear: both;
        }

        .quote-text {
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
            font-style: italic;
            line-height: 1.6;
        }

        .quote-author {
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        .quote-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-top: 5px;
        }

        .cover-img {
            max-width: 100px;
            float: right;
            margin-left: 20px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            margin: 60px;
            opacity: 0.5;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .notebook { padding: 40px 20px 40px 50px; }
            .notebook::before { left: 40px; }
            .cover-img { max-width: 70px; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>

    <header>
        <h1>Perles des Savants</h1>
    </header>

    <div class="notebook">
        <div class="filters">
            <button class="filter-btn active" onclick="updateFilter('all', this)">Tous</button>
            <button class="filter-btn" onclick="updateFilter('tawhid', this)">Tawhid</button>
            <button class="filter-btn" onclick="updateFilter('zuhd', this)">Zuhd</button>
            <button class="filter-btn" onclick="updateFilter('salafs', this)">Salafs</button>
            <button class="filter-btn" onclick="updateFilter('women', this)">Women</button>
            <button class="filter-btn" onclick="updateFilter('marriage', this)">Marriage</button>
        </div>

        <div id="quotes-container">
            <p>Chargement des perles...</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Perles des Savants
    </footer>

   <script>
    let allQuotes = [];

    async function fetchQuotes() {
        const container = document.getElementById('quotes-container');
        try {
            // Ajout d'un paramètre ?v= pour forcer Cloudflare à ignorer le cache
            const response = await fetch('/api/perles?v=' + Date.now());
            
            if (!response.ok) {
                throw new Error(`Erreur HTTP: ${response.status}`);
            }

            const data = await response.json();
            console.log("Données reçues :", data); 

            allQuotes = Array.isArray(data) ? data : (data.results || []);
            renderQuotes(allQuotes);
        } catch (err) {
            console.error("Erreur détaillée :", err);
            container.innerHTML = `<p style="color:var(--accent)">⚠️ Erreur de chargement : ${err.message}<br>Essayez de rafraîchir la page.</p>`;
        }
    }

    function renderQuotes(quotes) {
        const container = document.getElementById('quotes-container');
        if (!quotes || quotes.length === 0) {
            container.innerHTML = "<p>Aucune perle disponible.</p>";
            return;
        }

        container.innerHTML = quotes.map(q => {
            const text = q.text || q.TEXT || "";
            const author = q.author || q.AUTHOR || "Anonyme";
            const page = q.page || q.PAGE || "";
            const cover = q.cover_url || q.COVER_URL || null;
            const tag = q.tag || q.TAG || "";

            return `
            <div class="quote-card">
                ${cover ? `<img src="${cover}" class="cover-img">` : ''}
                <div class="quote-text">"${text}"</div>
                <span class="quote-author">
                    — ${author} 
                    ${page ? `<small style="opacity: 0.6; font-weight: normal;">(p. ${page})</small>` : ''}
                </span>
                <div class="quote-tag">${tag}</div>
            </div>
            <hr style="border: none; border-bottom: 1px solid var(--lines); margin: 1.5rem 0; clear: both;">
            `;
        }).join('');
    }

    function updateFilter(tag, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (tag === 'all') {
            renderQuotes(allQuotes);
        } else {
            renderQuotes(allQuotes.filter(q => (q.tag || q.TAG || "").toLowerCase() === tag.toLowerCase()));
        }
    }

    // Gestion du thème
    if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
    function toggleTheme() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    // Lancement
    window.onload = fetchQuotes;
</script>

</body>
</html>
