<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Perles des Savants</title>
    <link rel="stylesheet" href="style.css"> <style>
        body { padding: 20px; background: #f0f0f0; }
        .admin-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Ajouter une Perle</h2>
        <input type="text" id="author" placeholder="Auteur (ex: Imam Al-Ghazali)">
        <textarea id="content" placeholder="La citation..."></textarea>
        <select id="tag">
            <option value="Tawhid">Tawhid</option>
            <option value="Zuhd">Zuhd</option>
            <option value="Salafs">Salafs</option>
            <option value="Science">Science</option>
        </select>
        <button onclick="publishPerle()">Publier sur le site</button>
        <a href="/" class="back-link">← Retour au site public</a>
    </div>

    <script>
        async function publishPerle() {
            const perle = {
                author: document.getElementById('author').value,
                content: document.getElementById('content').value,
                tag: document.getElementById('tag').value
            };

            const response = await fetch('/api/perles', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(perle)
            });

            if (response.ok) {
                alert("Perle publiée avec succès !");
                window.location.href = "/";
            } else {
                alert("Erreur lors de la publication.");
            }
        }
    </script>
</body>
</html>
